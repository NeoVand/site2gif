<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>site2gif — Grant Access</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #0e0e14; color: #ededf2;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    .card { text-align: center; max-width: 440px; padding: 48px 40px; }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 32px; color: #a0a0b2; }
    .icon { font-size: 52px; margin-bottom: 20px; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .desc { color: #a0a0b2; font-size: 14px; line-height: 1.7; margin-bottom: 28px; }
    .status {
      display: inline-block; padding: 12px 28px; border-radius: 8px;
      font-size: 14px; font-weight: 600; transition: all .3s;
    }
    .status.loading { background: rgba(91,147,255,0.1); color: #5b93ff; }
    .status.success { background: rgba(52,211,153,0.1); color: #34d399; }
    .status.error { background: rgba(244,63,94,0.08); color: #f43f5e; }
    .hint { margin-top: 20px; font-size: 12px; color: #5e5e72; line-height: 1.6; }
    .hint a { color: #5b93ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">site2gif</div>
    <div class="icon" id="icon"></div>
    <h2 id="title"></h2>
    <p class="desc" id="desc">Your browser will ask for permission. Please click <strong>Allow</strong> when prompted.</p>
    <div class="status loading" id="status">Requesting access...</div>
    <p class="hint" id="hint"></p>
  </div>
  <script src="permissions.js"></script>
</body>
</html>
