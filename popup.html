<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>Talkover</title>
</head>
<body>
  <div class="app">

    <!-- ═══ CAPTURE VIEW ═══ -->
    <div class="view" id="viewCapture">
      <div class="capture-preview" id="previewArea">
        <div class="preview-placeholder" id="previewPlaceholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2">
            <rect x="2" y="2" width="20" height="20" rx="3"/>
            <polygon points="10,8 16,12 10,16"/>
          </svg>
          <p>Ready to capture this tab</p>
        </div>
        <img id="tabScreenshot" class="preview-media" style="display:none" alt="">
        <video id="webcamLive" class="webcam-pip pos-BR" style="display:none" muted playsinline autoplay></video>
        <div class="processing-overlay" id="processingOverlay" style="display:none">
          <div class="spinner"></div>
          <span class="processing-label">Saving recording...</span>
        </div>
        <div class="rec-overlay" id="recordingOverlay" style="display:none">
          <div class="rec-pill">
            <span class="rec-dot"></span>
            <span class="rec-time" id="recTimer">00:00</span>
          </div>
        </div>
        <div class="countdown-overlay" id="countdownOverlay" style="display:none">
          <span class="countdown-num" id="countdownNum"></span>
        </div>
      </div>

      <button class="record-btn" id="recordBtn">
        <span class="record-btn-dot"></span>
      </button>

      <!-- Option toggles row -->
      <div class="capture-opts">
        <label class="opt-switch">
          <input type="checkbox" id="showCursor" checked>
          <span class="sw"></span>
          <span>Cursor</span>
        </label>
        <label class="opt-switch">
          <input type="checkbox" id="audioEnabled">
          <span class="sw"></span>
          <span>Audio</span>
        </label>
        <label class="opt-switch">
          <input type="checkbox" id="webcamEnabled">
          <span class="sw"></span>
          <span>Webcam</span>
        </label>
      </div>

      <!-- Permission hints (shared row so both fit on one line) -->
      <div class="perm-hints-row" id="permHintsRow" style="display:none">
        <div class="perm-hint" id="micPermHint">Grant mic access</div>
        <div class="perm-hint" id="camPermHint">Grant camera access</div>
      </div>

      <!-- Audio sub-panel -->
      <div class="expand-panel" id="audioPanel" style="display:none">
        <div class="panel-row">
          <span class="panel-label">Mic</span>
          <select id="micSelect" class="dev-select mic-half">
            <option value="">None</option>
          </select>
          <div class="mic-level" id="micLevel"></div>
        </div>
      </div>

      <!-- Webcam sub-panel -->
      <div class="expand-panel" id="webcamPanel" style="display:none">
        <div class="panel-row">
          <span class="panel-label">Camera</span>
          <select id="webcamSelect" class="dev-select cam-select">
            <option value="">Select...</option>
          </select>
          <div class="pos-grid">
            <button class="pos-dot" data-pos="TL" title="Top left"></button>
            <button class="pos-dot" data-pos="TR" title="Top right"></button>
            <button class="pos-dot" data-pos="BL" title="Bottom left"></button>
            <button class="pos-dot active" data-pos="BR" title="Bottom right"></button>
          </div>
          <div class="shape-btns" id="shapeGroup">
            <button class="shape-btn active" data-value="rect" title="Rectangle">
              <svg width="18" height="13" viewBox="0 0 18 13"><rect x="1" y="1" width="16" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="shape-btn" data-value="square" title="Square">
              <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="shape-btn" data-value="circle" title="Circle">
              <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="capture-footer">
        <span class="keys"><kbd>Alt</kbd><kbd>Shift</kbd><kbd>R</kbd></span>
      </div>
    </div>

    <!-- ═══ DONE VIEW ═══ -->
    <div class="view" id="viewDone" style="display:none">

      <div class="done-topbar">
        <button class="new-btn" id="newRecording">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          New
        </button>
        <span class="done-logo">Talkover</span>
        <span class="done-dur"><span id="durationText"></span></span>
      </div>

      <div class="done-preview">
        <video id="previewVideo" class="preview-media" muted loop playsinline></video>
        <video id="doneWebcam" class="webcam-pip pos-BR" style="display:none" muted loop playsinline></video>
        <img id="previewGif" class="preview-media" style="display:none" alt="">
        <div class="preview-modes" id="previewTabs" style="display:none">
          <button class="mode-pill active" data-tab="video">VID</button>
          <button class="mode-pill" data-tab="gif">GIF</button>
        </div>
      </div>

      <div class="trim" id="trimSection">
        <div class="trim-track" id="trimTrack">
          <div class="trim-range" id="trimRange"></div>
          <div class="trim-handle" id="trimHandleStart"></div>
          <div class="trim-handle" id="trimHandleEnd"></div>
          <div class="trim-playhead" id="trimPlayhead"></div>
        </div>
        <div class="trim-meta">
          <span class="trim-time" id="trimStartTime">0.0s</span>
          <span class="trim-sel" id="trimSelectionLabel">Full clip</span>
          <span class="trim-time" id="trimEndTime">0.0s</span>
        </div>
      </div>

      <div class="export">
        <div class="format-switch">
          <button class="format-opt active" data-format="gif">GIF</button>
          <button class="format-opt" data-format="video">Video</button>
        </div>

        <div class="gif-opts" id="gifOpts">
          <div class="opt-row">
            <span class="opt-label">FPS</span>
            <div class="opt-pills" id="fpsGroup">
              <button class="opt-pill" data-value="5">5</button>
              <button class="opt-pill active" data-value="10">10</button>
              <button class="opt-pill" data-value="15">15</button>
              <button class="opt-pill" data-value="24">24</button>
              <button class="opt-pill" data-value="30">30</button>
            </div>
          </div>
          <div class="opt-row">
            <span class="opt-label">Scale</span>
            <div class="opt-pills" id="scaleGroup">
              <button class="opt-pill active" data-value="1">1x</button>
              <button class="opt-pill" data-value="0.75">.75</button>
              <button class="opt-pill" data-value="0.5">.5x</button>
              <button class="opt-pill" data-value="0.25">.25</button>
            </div>
          </div>
          <div class="opt-row">
            <span class="opt-label">Quality</span>
            <div class="opt-pills" id="qualityGroup">
              <button class="opt-pill" data-value="low">Lo</button>
              <button class="opt-pill active" data-value="medium">Med</button>
              <button class="opt-pill" data-value="high">Hi</button>
            </div>
            <label class="loop-chk">
              <input type="checkbox" id="loopGif" checked>
              <span>Loop</span>
            </label>
          </div>
        </div>

        <div class="video-info" id="videoInfo" style="display:none">
          <p class="video-note" id="videoNote">Original quality WebM. Trim applied if set.</p>
        </div>

        <div class="gen-progress" id="progressSection" style="display:none">
          <span class="gen-stage" id="progressStage"></span>
          <div class="gen-bar"><div class="gen-fill" id="progressFill"></div></div>
          <span class="gen-pct" id="progressLabel">0%</span>
        </div>

        <button class="save-btn" id="saveBtn">
          <span id="saveBtnText">Save GIF</span>
          <span class="save-size" id="saveBtnSize"></span>
        </button>
        <div class="video-save-btns" id="videoSaveBtns" style="display:none">
          <button class="save-btn save-btn-mp4" id="saveBtnMp4">
            <span id="saveBtnMp4Text">Save MP4</span>
            <span class="save-size" id="saveBtnMp4Size"></span>
          </button>
          <button class="save-btn save-btn-webm" id="saveBtnWebm">
            <span id="saveBtnWebmText">Save WebM</span>
            <span class="save-size" id="saveBtnWebmSize"></span>
          </button>
        </div>
      </div>
    </div>

    <video id="gifSourceVideo" style="display:none" muted playsinline></video>
    <canvas id="gifCanvas" style="display:none"></canvas>
  </div>

  <script src="db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
