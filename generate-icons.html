<!DOCTYPE html>
<html>
<head><title>Generate Talkover icons</title></head>
<body>
<h2>Talkover Icon Generator</h2>
<p>Right-click each icon and "Save image as..." to the icons/ folder, or click the download links.</p>
<div id="icons" style="display: flex; gap: 20px; align-items: end; margin: 20px;"></div>
<script>
const sizes = [16, 48, 128];

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size;

  // Background rounded rect
  const r = s * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#4f8efa');
  grad.addColorStop(1, '#6c6cf1');
  ctx.fillStyle = grad;
  ctx.fill();

  // Screen rectangle (representing the tab being recorded)
  const screenX = s * 0.12;
  const screenY = s * 0.18;
  const screenW = s * 0.76;
  const screenH = s * 0.52;
  const screenR = s * 0.06;
  ctx.beginPath();
  ctx.moveTo(screenX + screenR, screenY);
  ctx.lineTo(screenX + screenW - screenR, screenY);
  ctx.quadraticCurveTo(screenX + screenW, screenY, screenX + screenW, screenY + screenR);
  ctx.lineTo(screenX + screenW, screenY + screenH - screenR);
  ctx.quadraticCurveTo(screenX + screenW, screenY + screenH, screenX + screenW - screenR, screenY + screenH);
  ctx.lineTo(screenX + screenR, screenY + screenH);
  ctx.quadraticCurveTo(screenX, screenY + screenH, screenX, screenY + screenH - screenR);
  ctx.lineTo(screenX, screenY + screenR);
  ctx.quadraticCurveTo(screenX, screenY, screenX + screenR, screenY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fill();

  // Webcam circle (PIP in bottom-right of screen)
  const camR = s * 0.12;
  const camX = screenX + screenW - s * 0.08;
  const camY = screenY + screenH - s * 0.04;
  ctx.beginPath();
  ctx.arc(camX, camY, camR, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fill();

  // Person silhouette in webcam circle
  ctx.fillStyle = size >= 48 ? '#5b7ef7' : '#5b7ef7';
  // Head
  const headR = camR * 0.3;
  ctx.beginPath();
  ctx.arc(camX, camY - camR * 0.18, headR, 0, Math.PI * 2);
  ctx.fill();
  // Shoulders
  ctx.beginPath();
  ctx.ellipse(camX, camY + camR * 0.35, camR * 0.5, camR * 0.35, 0, Math.PI, 0);
  ctx.fill();

  // Speech lines (representing "talk over")
  if (size >= 48) {
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = Math.max(1, s * 0.025);
    ctx.lineCap = 'round';
    for (let i = 0; i < 3; i++) {
      const lineX = s * 0.18 + i * s * 0.1;
      const lineY = s * 0.82;
      const lineW = s * 0.06;
      ctx.beginPath();
      ctx.moveTo(lineX, lineY);
      ctx.lineTo(lineX + lineW, lineY);
      ctx.stroke();
    }
  }

  // Record dot (top-right)
  const dotR = Math.max(1, s * 0.06);
  ctx.beginPath();
  ctx.arc(s * 0.82, s * 0.18, dotR + Math.max(0.5, s * 0.015), 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.82, s * 0.18, dotR, 0, Math.PI * 2);
  ctx.fillStyle = '#ff6b6b';
  ctx.fill();

  const container = document.createElement('div');
  container.style.textAlign = 'center';
  canvas.style.border = '1px solid #ccc';
  container.appendChild(canvas);

  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = `icon${size}.png`;
  link.textContent = `icon${size}.png`;
  link.style.display = 'block';
  link.style.marginTop = '8px';
  container.appendChild(link);

  document.getElementById('icons').appendChild(container);
});
</script>
</body>
</html>
